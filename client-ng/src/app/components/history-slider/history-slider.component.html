<div class="slider-container" *ngIf="snapshots.length > 0">
  <div class="slider-header">
    <span class="title">TIME TRAVEL</span>
    <div class="live-status" [class.is-live]="isLive">
      <span class="live-dot"></span> {{ isLive ? 'LIVE' : 'PAST VIEW' }}
    </div>
  </div>

  <div class="time-display" *ngIf="selectedSnapshot">
    {{ formatLabel(selectedSnapshot.timestamp) }}
  </div>

  <div class="range-wrap">
    <input type="range" [min]="0" [max]="snapshots.length - 1" [value]="currentIndex"
           (input)="onSliderInput($event)" class="history-range" />
    <div class="tick-labels">
      <span class="tick">-12H</span>
      <span class="tick">-6H</span>
      <span class="tick">NOW</span>
    </div>
  </div>
</div>
